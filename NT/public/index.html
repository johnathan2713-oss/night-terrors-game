<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Night Terrors - Ghost Update</title>
    <script src="/socket.io/socket.io.js" onerror="handleScriptError()"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #020204; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; -webkit-user-select: none; user-select: none;
            touch-action: none;
        }
        #gameContainer { position: relative; box-shadow: 0 0 30px rgba(100, 0, 0, 0.4); }
        canvas { border: 2px solid #222; background: #000; display: block; max-width: 100vw; max-height: 100vh; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let scriptFailed = false;
function handleScriptError() {
    scriptFailed = true;
    showCrashScreen("CRITICAL ERROR: Failed to fetch backend systems.");
}

function showCrashScreen(msg) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ff0000";
    ctx.font = "16px 'Courier New'";
    ctx.textAlign = "center";
    msg.split('\n').forEach((line, i) => ctx.fillText(line, canvas.width / 2, canvas.height / 2 + (i * 25)));
}

if (typeof io === 'undefined') { handleScriptError(); } else { runGameEngine(); }

function runGameEngine() {
    const socket = io();
    let gameState = "MENU";
    let myId = null;
    let players = {};
    let ghost = { x: 0, y: 0, pulse: 0 };
    let currentRoomCode = "NONE";
    let selectedMap = "ASYLUM";
    let mapData = { width: 800, height: 600, walls: [], equipment: [], color: "#000" };
    let playerName = "Investigator_" + Math.floor(Math.random() * 900 + 100);

    let isMobile = false;
    let joystick = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, vx: 0, vy: 0, rad: 50 };
    let audioCtx = null;

    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) isMobile = true;

    // Web Audio Synthesizer for procedural creepy background music
    function startCreepyBGM() {
        if (audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Sub-drone oscillator
            let drone = audioCtx.createOscillator();
            let filter = audioCtx.createBiquadFilter();
            let gain = audioCtx.createGain();

            drone.type = 'sawtooth';
            drone.frequency.setValueAtTime(55, audioCtx.currentTime); // Low A note

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(200, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);

            drone.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            drone.start();

            // Periodic tension sweep notes
            setInterval(() => {
                if (gameState !== "PLAY") return;
                let pitch = [58.27, 61.74, 65.41][Math.floor(Math.random() * 3)]; // Creepy scale freqs
                let ping = audioCtx.createOscillator();
                let pingGain = audioCtx.createGain();
                
                ping.type = 'sine';
                ping.frequency.setValueAtTime(pitch, audioCtx.currentTime);
                
                pingGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                pingGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 4);
                
                ping.connect(pingGain);
                pingGain.connect(audioCtx.destination);
                ping.start();
                ping.stop(audioCtx.currentTime + 4);
            }, 3500);

        } catch(e) { console.log("Audio couldn't init context", e); }
    }

    const buttons = {
        MENU: [
            { text: "CREATE LOBBY", x: 275, y: 220, w: 250, h: 50, action: () => socket.emit("createRoomRequest", playerName) },
            { text: "JOIN LOBBY (TEST)", x: 275, y: 290, w: 250, h: 50, action: () => {
                let code = prompt("Enter 4-Letter Room Code:");
                if(code) socket.emit("joinRoom", { roomCode: code.toUpperCase(), name: playerName });
            }},
            { text: "CHANGE NAME", x: 275, y: 360, w: 250, h: 50, action: () => {
                let n = prompt("Enter Name:", playerName);
                if(n) playerName = n.trim().substring(0, 12);
            }}
        ],
        LOBBY_ROOM: [
            { text: "SELECT MAP: ASYLUM", x: 275, y: 340, w: 250, h: 40, action: () => socket.emit("changeMap", "ASYLUM") },
            { text: "SELECT MAP: CABIN", x: 275, y: 390, w: 250, h: 40, action: () => socket.emit("changeMap", "CABIN") },
            { text: "START INVESTIGATION", x: 275, y: 470, w: 250, h: 50, action: () => { startCreepyBGM(); socket.emit("startGameSignal"); } },
            { text: "LEAVE", x: 40, y: 530, w: 120, h: 40, action: () => location.reload() }
        ],
        PLAY_MOBILE: [
            { text: "USE", x: 690, y: 380, w: 70, h: 70, isCircle: true, actionStart: () => socket.emit("useItem", true), actionEnd: () => socket.emit("useItem", false) },
            { text: "DROP", x: 590, y: 420, w: 60, h: 60, isCircle: true, actionStart: () => socket.emit("dropItem") }
        ]
    };

    function getCanvasCoords(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
    }

    canvas.addEventListener("touchstart", (e) => {
        for (let t of e.changedTouches) {
            let pos = getCanvasCoords(t.clientX, t.clientY);
            if (gameState === "PLAY") {
                let hitButton = false;
                buttons.PLAY_MOBILE.forEach(b => {
                    let dx = pos.x - b.x; let dy = pos.y - b.y;
                    if (Math.sqrt(dx*dx + dy*dy) < b.w/2) {
                        hitButton = true; t.buttonAction = b; if(b.actionStart) b.actionStart();
                    }
                });
                for (let i = 0; i < 3; i++) {
                    let slotX = 260 + (i * 95);
                    if (pos.x >= slotX && pos.x <= slotX + 85 && pos.y >= 530 && pos.y <= 580) {
                        socket.emit("changeSlot", i); hitButton = true;
                    }
                }
                if (!hitButton && pos.x < canvas.width / 2) {
                    joystick.active = true; joystick.touchId = t.identifier;
                    joystick.startX = pos.x; joystick.startY = pos.y;
                    joystick.curX = pos.x; joystick.curY = pos.y;
                }
            } else {
                handleMenuClicks(pos.x, pos.y);
            }
        }
    });

    canvas.addEventListener("touchmove", (e) => {
        if (gameState !== "PLAY") return;
        for (let t of e.changedTouches) {
            if (joystick.active && t.identifier === joystick.touchId) {
                let pos = getCanvasCoords(t.clientX, t.clientY);
                joystick.curX = pos.x; joystick.curY = pos.y;
                let dx = joystick.curX - joystick.startX; let dy = joystick.curY - joystick.startY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > joystick.rad) {
                    joystick.curX = joystick.startX + (dx / dist) * joystick.rad;
                    joystick.curY = joystick.startY + (dy / dist) * joystick.rad;
                }
                joystick.vx = (joystick.curX - joystick.startX) / joystick.rad;
                joystick.vy = (joystick.curY - joystick.startY) / joystick.rad;
            }
        }
    });

    canvas.addEventListener("touchend", (e) => {
        for (let t of e.changedTouches) {
            if (joystick.active && t.identifier === joystick.touchId) {
                joystick.active = false; joystick.vx = 0; joystick.vy = 0;
            }
            if (t.buttonAction && t.buttonAction.actionEnd) t.buttonAction.actionEnd();
        }
    });

    canvas.addEventListener("click", (e) => {
        if (gameState === "PLAY") return;
        let pos = getCanvasCoords(e.clientX, e.clientY);
        handleMenuClicks(pos.x, pos.y);
    });

    function handleMenuClicks(mx, my) {
        if (buttons[gameState]) {
            buttons[gameState].forEach(b => {
                if (gameState === "LOBBY_ROOM") {
                    let ids = Object.keys(players);
                    if (ids[0] !== myId && b.text !== "LEAVE") return; 
                }
                if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) b.action();
            });
        }
    }

    window.addEventListener("mousedown", (e) => { if(gameState === "PLAY" && !isMobile) socket.emit("useItem", true); });
    window.addEventListener("mouseup", (e) => { if(gameState === "PLAY" && !isMobile) socket.emit("useItem", false); });

    let keys = {};
    window.addEventListener("keydown", (e) => { 
        keys[e.key.toLowerCase()] = true; 
        if(gameState === "PLAY") {
            if(e.key === "1") socket.emit("changeSlot", 0);
            if(e.key === "2") socket.emit("changeSlot", 1);
            if(e.key === "3") socket.emit("changeSlot", 2);
            if(e.key.toLowerCase() === "g") socket.emit("dropItem");
        }
    });
    window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

    socket.on("init", (id) => { myId = id; });
    socket.on("roomUpdate", (data) => {
        currentRoomCode = data.code; players = data.players;
        selectedMap = data.selectedMap; mapData = data.mapData; gameState = data.gameState;
    });
    socket.on("gameStarted", (data) => { startCreepyBGM(); mapData = data.mapData; gameState = "PLAY"; });
    socket.on("serverUpdate", (pack) => {
        ghost = pack.ghost;
        Object.keys(pack.players).forEach(id => {
            if(players[id]) {
                players[id].x = pack.players[id].x; players[id].y = pack.players[id].y;
                players[id].inventory = pack.players[id].inventory;
                players[id].activeSlot = pack.players[id].activeSlot;
                players[id].isUsingItem = pack.players[id].isUsingItem;
            } else { players[id] = pack.players[id]; }
        });
    });

    function updateGame() {
        if (gameState !== "PLAY" || !myId || !players[myId]) return;
        let nextX = players[myId].x; let nextY = players[myId].y; let speed = 4;
        if (keys['w'] || keys['arrowup']) nextY -= speed;
        if (keys['s'] || keys['arrowdown']) nextY += speed;
        if (keys['a'] || keys['arrowleft']) nextX -= speed;
        if (keys['d'] || keys['arrowright']) nextX += speed;
        if (joystick.active) { nextX += joystick.vx * speed; nextY += joystick.vy * speed; }
        if (nextX !== players[myId].x || nextY !== players[myId].y) {
            socket.emit("playerMove", { x: nextX, y: nextY });
        }
    }

    function drawButton(b, isDisabled = false) {
        ctx.fillStyle = isDisabled ? "#0a0a0a" : "#1a1a1a"; ctx.strokeStyle = isDisabled ? "#444" : "#ff0000"; ctx.lineWidth = 2;
        ctx.fillRect(b.x, b.y, b.w, b.h); ctx.strokeRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = isDisabled ? "#444" : "#fff"; ctx.font = "13px 'Courier New'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === "MENU") {
            ctx.fillStyle = "#ff0000"; ctx.font = "42px 'Courier New'"; ctx.textAlign = "center";
            ctx.fillText("NIGHT TERRORS", canvas.width / 2, 120);
            ctx.fillStyle = "#888"; ctx.font = "16px 'Courier New'";
            ctx.fillText(`Current Name: ${playerName}`, canvas.width / 2, 170);
            buttons.MENU.forEach(b => drawButton(b));
        } 
        else if (gameState === "LOBBY_ROOM") {
            ctx.fillStyle = "#ff0000"; ctx.font = "32px 'Courier New'"; ctx.textAlign = "center";
            ctx.fillText(`LOBBY ROOM: ${currentRoomCode}`, canvas.width / 2, 70);
            ctx.fillStyle = "#ffaa00"; ctx.font = "16px 'Courier New'";
            ctx.fillText(`Selected Destination: ${selectedMap}`, canvas.width/2, 110);
            ctx.textAlign = "left"; ctx.font = "18px 'Courier New'";
            let idx = 0; let playerIds = Object.keys(players);
            playerIds.forEach(id => {
                ctx.fillStyle = (id === myId) ? "#00ff00" : "#ffffff";
                ctx.fillText(`- ${(idx === 0) ? "[HOST] " : ""}${players[id].name}`, 220, 160 + (idx * 35));
                idx++;
            });
            buttons.LOBBY_ROOM.forEach(b => drawButton(b, (playerIds[0] !== myId) && b.text !== "LEAVE"));
        } 
        else if (gameState === "PLAY") {
            const me = players[myId]; if (!me) return;

            let camX = -me.x + canvas.width / 2; let camY = -me.y + canvas.height / 2;
            camX = Math.min(0, Math.max(camX, canvas.width - mapData.width));
            camY = Math.min(0, Math.max(camY, canvas.height - mapData.height));

            ctx.save();
            ctx.translate(camX, camY);

            // Draw Base Layout Floor
            ctx.fillStyle = mapData.color || "#050505";
            ctx.fillRect(0, 0, mapData.width, mapData.height);

            // Equipment drops
            if (mapData.equipment) {
                mapData.equipment.forEach(item => {
                    if (!item.pickedUp) {
                        ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(item.x, item.y, 6, 0, Math.PI*2); ctx.fill();
                    }
                });
            }

            // Draw Obstacle Walls
            ctx.fillStyle = "#221111"; ctx.strokeStyle = "#442222"; ctx.lineWidth = 2;
            if (mapData.walls) {
                mapData.walls.forEach(w => { ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeRect(w.x, w.y, w.w, w.h); });
            }

            // Draw Ghost Entity (Appearing floaty and transparent)
            if (ghost) {
                let sizeOscillation = 16 + Math.sin(ghost.pulse) * 3;
                ctx.save();
                ctx.globalAlpha = 0.45 + Math.sin(ghost.pulse) * 0.15; // Phasing visibility
                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = "#00ffaa";
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(ghost.x, ghost.y, sizeOscillation, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Draw Investigators
            Object.keys(players).forEach(id => {
                const p = players[id];
                ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
                ctx.fillStyle = id === myId ? "#00bb00" : "#0077ff"; ctx.fill();
            });

            // 🌫️ DARK FOG OF WAR EFFECT COVER
            ctx.restore(); // Snap out of camera space briefly to generate absolute overlay mask
            
            // Draw a black block covering the full screen view
            ctx.save();
            ctx.globalCompositeOperation = 'multiply';
            
            // Create lighting cutout centered onto player
            let visibilityRadius = 110;
            if (me.isUsingItem && me.inventory[me.activeSlot] === "Flashlight") {
                visibilityRadius = 240; // High intensity reveal radius
            }

            let fogGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, visibilityRadius - 60, canvas.width/2, canvas.height/2, visibilityRadius + 40);
            fogGrad.addColorStop(0, "rgba(255,255,255,1)");   // Complete Visibility cutout
            fogGrad.addColorStop(0.6, "rgba(50,50,60,0.4)");  // Soft dark fog thickness
            fogGrad.addColorStop(1, "rgba(0,0,0,0)");         // Pitch black darkness out of sight

            ctx.fillStyle = fogGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Re-enter tracking scope purely to draw text over player locations safely
            ctx.save(); ctx.translate(camX, camY);
            Object.keys(players).forEach(id => {
                const p = players[id];
                ctx.fillStyle = "#fff"; ctx.font = "11px monospace"; ctx.textAlign = "center";
                ctx.fillText(p.name, p.x, p.y - 22);
            });
            ctx.restore();

            // DRAW HUDS INVENTORY CONTROLS
            for (let i = 0; i < 3; i++) {
                let slotX = 260 + (i * 95); let slotY = 530;
                ctx.fillStyle = me.activeSlot === i ? "rgba(150, 0, 0, 0.2)" : "rgba(10,10,15,0.8)";
                ctx.strokeStyle = me.activeSlot === i ? "#ff0000" : "#444"; ctx.lineWidth = 2;
                ctx.fillRect(slotX, slotY, 85, 50); ctx.strokeRect(slotX, slotY, 85, 50);
                ctx.fillStyle = "#555"; ctx.font = "10px monospace"; ctx.textAlign = "left";
                ctx.fillText(`[${i+1}]`, slotX + 5, slotY + 12);
                ctx.fillStyle = me.inventory[i] !== "Empty" ? "#00ffff" : "#444";
                ctx.font = "10px 'Courier New'"; ctx.textAlign = "center";
                ctx.fillText(me.inventory[i], slotX + 42, slotY + 32);
            }

            if (isMobile) {
                if (joystick.active) {
                    ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, joystick.rad, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "rgba(255,0,0,0.4)"; ctx.beginPath(); ctx.arc(joystick.curX, joystick.curY, 18, 0, Math.PI*2); ctx.fill();
                }
                buttons.PLAY_MOBILE.forEach(b => {
                    ctx.fillStyle = "rgba(100, 0, 0, 0.2)"; ctx.strokeStyle = "#aa0000"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#fff"; ctx.font = "bold 11px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(b.text, b.x, b.y);
                });
            }
        }
    }

    function mainLoop() { updateGame(); render(); requestAnimationFrame(mainLoop); }
    mainLoop();
}
</script>
</body>
</html>
